<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Reference</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">py<span>ref</span></div>
      <input
        id="search"
        type="text"
        placeholder="Search…  (try: queue, lru, heapq, asyncio)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <div id="status" class="status"></div>
      <div class="type-filter" id="type-filter">
        <button id="type-filter-btn" class="type-filter-btn" title="Choose which article types to show">Types ▾</button>
        <div id="type-filter-menu" class="type-filter-menu" hidden>
          <label><input type="checkbox" data-type="reference" checked> Reference</label>
          <label><input type="checkbox" data-type="concept" checked> Concept</label>
          <label><input type="checkbox" data-type="algo" checked> Algorithm</label>
          <label><input type="checkbox" data-type="pattern" checked> Pattern</label>
          <label><input type="checkbox" data-type="solution" checked> Solution</label>
          <div class="type-filter-actions">
            <button data-action="all">All</button>
            <button data-action="none">None</button>
          </div>
        </div>
      </div>
      <button id="hl-toggle" class="hl-toggle active" title="Toggle search-term highlighting in articles">✨ Highlight</button>
      <button id="play-btn" class="play-btn" title="Open playground (runs Python)">▶ Playground</button>
      <div class="theme-switch" id="theme-switch" role="group" aria-label="Theme">
        <button data-theme="dark"  title="Dark">Dark</button>
        <button data-theme="light" title="Light">Light</button>
        <button data-theme="sepia" title="Neutral (calm gray)">Neutral</button>
      </div>
    </header>

    <main>
      <aside id="results" class="results"></aside>
      <div id="resizer" class="resizer" role="separator" aria-orientation="vertical" title="Drag to resize"></div>
      <article id="article" class="article">
        <div class="empty">
          <p>Type to search. <kbd>↑</kbd><kbd>↓</kbd> to move, <kbd>Enter</kbd> to open, <kbd>/</kbd> to focus search, <kbd>Esc</kbd> to clear.</p>
        </div>
      </article>

      <!-- Playground overlay (hidden until opened) -->
      <section id="playground" class="playground" hidden>
        <div class="pg-toolbar">
          <span class="pg-title">Playground</span>
          <button id="pg-run" class="pg-run" title="Run (⌘/Ctrl+Enter)">▶ Run</button>
          <button id="pg-reset" class="pg-btn" title="Reset to boilerplate">Reset</button>
          <button id="pg-clear" class="pg-btn" title="Clear output">Clear output</button>
          <span id="pg-status" class="pg-status"></span>
          <button id="pg-close" class="pg-btn pg-close" title="Close (Esc)">✕ Close</button>
        </div>
        <div class="pg-body">
          <div id="pg-editor" class="pg-editor"></div>
          <div id="pg-vsep" class="pg-vsep"></div>
          <pre id="pg-output" class="pg-output"><span class="pg-hint">Output appears here. Press ⌘/Ctrl+Enter to run.</span></pre>
        </div>
      </section>
    </main>
  </div>

  <script src="/vendor/minisearch.min.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/vendor/highlight-python.min.js"></script>
  <script src="/app.js"></script>
  <script src="/playground.js"></script>
</body>
</html>
